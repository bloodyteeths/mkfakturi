user www;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /run/nginx/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Use a writable temp directory for request bodies (file uploads)
    client_body_temp_path /tmp/nginx_client_body;
    # Allow larger uploads for receipt scanning and invoice PDFs
    client_max_body_size 25M;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/vnd.ms-fontobject
        font/ttf
        font/opentype
        image/svg+xml;

    server {
        # Listen on both common Railway Metal Edge ports
        listen 80;
        listen 8080;
        server_name _;
        root /var/www/html/public;
        index index.php;

        # Vite build assets — content-hashed filenames, cache forever
        location /build/assets/ {
            expires max;
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header X-Content-Type-Options "nosniff";
            access_log off;
        }

        # Images
        location ~* \.(ico|png|jpg|jpeg|gif|webp|svg)$ {
            expires 7d;
            add_header Cache-Control "public, max-age=604800";
            access_log off;
            try_files $uri =404;
        }

        # Fonts
        location ~* \.(woff|woff2|ttf|otf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, max-age=2592000";
            add_header Access-Control-Allow-Origin "*";
            access_log off;
        }

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include fastcgi_params;

            # Additional params for Laravel
            fastcgi_param PATH_INFO $fastcgi_path_info;
            fastcgi_param PATH_TRANSLATED $document_root$fastcgi_path_info;

            # Increase timeouts for slow operations
            fastcgi_read_timeout 600;
            fastcgi_send_timeout 600;

            # Buffer settings — PDFs (UJP forms) can be 1.3MB+
            fastcgi_buffer_size 128k;
            fastcgi_buffers 8 256k;
            fastcgi_busy_buffers_size 512k;
        }

        location ~ /\.(?!well-known).* {
            deny all;
        }
    }
}
