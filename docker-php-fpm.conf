[www]
user = www
group = www
listen = 127.0.0.1:9000
pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8
pm.max_requests = 1000

; Ensure environment variables are passed to workers (critical for Railway)
clear_env = no

; Catch worker output and send to stdout
catch_workers_output = yes
decorate_workers_output = no

; Log errors
php_admin_value[error_log] = /var/www/html/storage/logs/php-fpm-error.log
php_admin_flag[log_errors] = on

; Production: do NOT display errors to users
php_admin_value[display_errors] = off
